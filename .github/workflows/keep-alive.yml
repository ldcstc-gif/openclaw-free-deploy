# .github/workflows/keep-alive.yml
#
# HF Spaces free tier sleeps after HTTP inactivity. This pings every 25 min to
# keep it warm. Useful in BOTH modes: in webhook mode it prevents Telegram
# messages from being dropped during a cold start.
#
# Setup: repo Settings → Secrets and variables → Actions → New repository secret
#        SPACE_URL = https://<your-username>-<space-name>.hf.space
#
# GitHub cron is best-effort (can skew up to 15 min at peak); 25 min gives slack.

name: keep-alive

on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch: {}

concurrency:
  group: keep-alive
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping HF Space (/healthz, fall back to /)
        env:
          SPACE_URL: ${{ secrets.SPACE_URL }}
        run: |
          set -u
          if [ -z "${SPACE_URL:-}" ]; then
            echo "::notice::SPACE_URL secret not set — skipping ping."
            exit 0
          fi
          URL_HEALTH="${SPACE_URL%/}/healthz"
          URL_ROOT="${SPACE_URL%/}/"
          code=$(curl -m 30 -sS -o /dev/null -w '%{http_code}' -L -I "$URL_HEALTH" || echo "000")
          echo "HEAD $URL_HEALTH → $code"
          if [ "$code" = "200" ]; then
            echo "✓ Space awake."
          else
            code2=$(curl -m 30 -sS -o /dev/null -w '%{http_code}' -L -I "$URL_ROOT" || echo "000")
            echo "fallback HEAD $URL_ROOT → $code2"
            case "$code2" in
              200|301|302) echo "✓ Space awake (via /)." ;;
              *) echo "::warning::Space not healthy (got $code / $code2). May be sleeping or building." ;;
            esac
          fi
          true   # never fail this workflow

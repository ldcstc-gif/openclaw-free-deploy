# .github/workflows/keep-alive.yml
#
# Free-tier services (Render, HF Spaces) sleep after HTTP inactivity.
# This pings every 25 min to keep the service warm so Telegram polling
# stays active without interruption.
#
# Setup: repo Settings → Secrets and variables → Actions → New repository secret
#   SERVICE_URL = https://<your-service>.onrender.com   (Render)
#   or
#   SERVICE_URL = https://<username>-<space-name>.hf.space   (HF Spaces)
#
# Legacy: SPACE_URL is also checked for backwards compatibility.
#
# GitHub cron is best-effort (can skew up to 15 min at peak); 25 min gives slack.

name: keep-alive

on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch: {}

concurrency:
  group: keep-alive
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping service (/healthz, fall back to /)
        env:
          SERVICE_URL: ${{ secrets.SERVICE_URL }}
          SPACE_URL: ${{ secrets.SPACE_URL }}
        run: |
          set -u
          # Prefer SERVICE_URL; fall back to legacy SPACE_URL
          TARGET="${SERVICE_URL:-${SPACE_URL:-}}"
          if [ -z "$TARGET" ]; then
            echo "::notice::Neither SERVICE_URL nor SPACE_URL secret is set — skipping ping."
            exit 0
          fi
          URL_HEALTH="${TARGET%/}/healthz"
          URL_ROOT="${TARGET%/}/"
          # Render free tier cold-start can take 50s+; allow generous timeout.
          code=$(curl -m 90 -sS -o /dev/null -w '%{http_code}' -L -I "$URL_HEALTH" || echo "000")
          echo "HEAD $URL_HEALTH → $code"
          if [ "$code" = "200" ]; then
            echo "✓ Service awake."
          else
            code2=$(curl -m 90 -sS -o /dev/null -w '%{http_code}' -L -I "$URL_ROOT" || echo "000")
            echo "fallback HEAD $URL_ROOT → $code2"
            case "$code2" in
              200|301|302) echo "✓ Service awake (via /)." ;;
              *) echo "::warning::Service not healthy (got $code / $code2). May be sleeping or building." ;;
            esac
          fi
          true   # never fail this workflow

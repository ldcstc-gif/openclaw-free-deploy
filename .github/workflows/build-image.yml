# .github/workflows/build-image.yml  (#1 prebuilt image + #3 vuln scan)
#
# On push to main (and weekly), build the Docker image, push it to the GitHub
# Container Registry (GHCR), and scan it with Trivy. The published image lets
# HF Spaces boot in ~30s via Dockerfile.prebuilt instead of a 5-min build.
#
# The image is published at:  ghcr.io/<owner>/openclaw-free-deploy:latest
# GHCR uses the repo's GITHUB_TOKEN — no extra secret needed for public repos.

name: build-image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'scripts/start.sh'
      - '.github/workflows/build-image.yml'
  schedule:
    - cron: '0 6 * * 1'        # weekly rebuild to pick up base-image patches
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  security-events: write       # required to upload Trivy SARIF

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        # Don't fail the build on findings — we just want visibility in the
        # Security tab. Tighten to `exit-code: 1` once your base is clean.

      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

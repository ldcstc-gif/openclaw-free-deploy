# .github/workflows/lint.yml  (#4 static checks)
#
# Cheap, fast gate on every push/PR:
#   * shellcheck  → bash scripts (start.sh, deploy*.sh, set-webhook.sh)
#   * hadolint    → Dockerfile best practices
#   * actionlint  → the workflow YAML itself
#
# These catch the classes of bug that are painful to debug only after a 5-min
# HF build (unquoted vars, wrong test syntax, bad workflow expressions).

name: lint

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          # SC1090/SC1091: we don't follow sourced files. SC2155: acceptable here.
          SHELLCHECK_OPTS: -e SC1090 -e SC1091 -x
        with:
          scandir: ./scripts
          additional_files: ''

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # DL3008: pin apt versions — acceptable to skip for a slim base.
          # DL3018/DL3016: npm/apk pinning — we pin openclaw via build arg.
          ignore: DL3008,DL3018,DL3016
          failure-threshold: warning

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint workflow files
        uses: raven-actions/actionlint@v2
        with:
          files: '.github/workflows/*.yml'
